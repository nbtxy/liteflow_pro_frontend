<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Hexagonal network with central node - LiteFlow logo -->
  <!-- Outer hexagon edges -->
  <g stroke="#b2dfdb" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top edges -->
    <line x1="100" y1="30" x2="160" y2="60"/>
    <line x1="100" y1="30" x2="40" y2="60"/>
    <!-- Upper-middle edges -->
    <line x1="160" y1="60" x2="160" y2="120"/>
    <line x1="40" y1="60" x2="40" y2="120"/>
    <!-- Lower edges -->
    <line x1="160" y1="120" x2="100" y2="150"/>
    <line x1="40" y1="120" x2="100" y2="150"/>
    <!-- Center spokes -->
    <line x1="100" y1="30" x2="100" y2="90"/>
    <line x1="40" y1="60" x2="100" y2="90"/>
    <line x1="160" y1="60" x2="100" y2="90"/>
    <line x1="40" y1="120" x2="100" y2="90"/>
    <line x1="160" y1="120" x2="100" y2="90"/>
    <line x1="100" y1="150" x2="100" y2="90"/>
  </g>
  <!-- Vertex nodes -->
  <g fill="#2BA89E">
    <circle cx="100" cy="30" r="8"/>
    <circle cx="160" cy="60" r="8"/>
    <circle cx="40" cy="60" r="8"/>
    <circle cx="160" cy="120" r="8"/>
    <circle cx="40" cy="120" r="8"/>
    <circle cx="100" cy="150" r="8"/>
  </g>
  <!-- Central node (ring) -->
  <circle cx="100" cy="90" r="18" fill="#2BA89E"/>
  <circle cx="100" cy="90" r="8" fill="white"/>
</svg>
